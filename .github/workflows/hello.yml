name: My First Action

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 23f2005675@ds.study.iitm.ac.in
        run: echo "Hello, world!"
```

**What each part means:**
- `name:` — the display name of your workflow
- `on: push:` — run this automatically whenever you push code to the `main` branch
- `on: workflow_dispatch:` — also lets you trigger it **manually** from the GitHub website (very handy!)
- `runs-on: ubuntu-latest` — use a free Linux computer in GitHub's cloud
- `steps:` — the list of things to do; the `name:` here **must contain your email**
- `run: echo "Hello, world!"` — the actual command that runs (just prints text)

---

### Step 4: Commit (save) the file

Scroll down to the **Commit changes** section:
- Leave the default message or write something like `Add GitHub Action`
- Make sure **Commit directly to the `main` branch** is selected
- Click **Commit changes**

This save will **automatically trigger** the action (because you pushed to `main`)!

---

### Step 5: Check that the action ran

1. Click the **Actions** tab at the top of your repository
2. You should see your workflow listed — it might show a yellow spinning circle (running) or a green checkmark (done)
3. Click on it to see the details and confirm the step named with your email ran successfully ✅

---

### Step 6 (Optional): Trigger it manually

If you want to trigger it again to make sure it's the **most recent** action:
1. Click the **Actions** tab
2. Click your workflow name on the left sidebar
3. Click the **Run workflow** button (dropdown) → **Run workflow**
4. This works because you added `workflow_dispatch` to the file

---

### Step 7: Get your repository URL

Your repo URL will look like:
```
https://github.com/YOUR_USERNAME/YOUR_REPO_NAME
